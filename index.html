<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visualizador Eleitoral</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: 280px;
      max-height: 90vh;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      padding: 14px;
      overflow-y: auto;
      overflow-x: visible;
      transition: transform 0.3s ease;
    }

    #sidebar.collapsed {
      transform: translateX(-245px);
    }

    /* ── Painel de filtros ── */

    #filterPanel {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e0e0e0;
    }

    .filter-label {
      font-size: 11px;
      font-weight: bold;
      color: #888;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-btn {
      padding: 5px 11px;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .filter-btn:hover {
      background: #eaf3ff;
      border-color: #90c0ff;
    }

    .filter-btn.active {
      background: #2980b9;
      color: white;
      border-color: #2980b9;
    }

    /* ── Lista de bairros ── */

    #sidebar h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    #bairroSearch {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    #bairroList {
      max-height: 30vh;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 6px;
      background: #fafafa;
    }

    .bairro-item {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    .bairro-item:hover {
      background: #eaf3ff;
    }

    .bairro-item.active {
      background: #d6e9ff;
      font-weight: bold;
    }

    #clearFilter {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #f1f1f1;
      cursor: pointer;
      font-size: 14px;
    }

    #clearFilter:hover {
      background: #e3e3e3;
    }

    #resultInfo {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

    /* ── Botão recolher ── */

    #toggleSidebar {
      position: absolute;
      top: 50%;
      right: -18px;
      transform: translateY(-50%);
      width: 36px;
      height: 64px;
      border: none;
      border-radius: 0 10px 10px 0;
      background: white;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.15);
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    #toggleSidebar:hover {
      background: #f3f3f3;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <button id="toggleSidebar">◀</button>

  <!-- ── Painel de filtros ── -->
  <div id="filterPanel">
    <div class="filter-label">Carregar Dados</div>

    <div class="filter-label">Tipo de Eleição</div>
    <div class="filter-group" id="grupoTipoEleicao">
      <!-- preenchido pelo JS -->
    </div>

    <div class="filter-label">Cargo</div>
    <div class="filter-group" id="grupoCargo">
      <!-- preenchido pelo JS -->
    </div>
  </div>

  <!-- ── Lista de bairros ── -->
  <h3>Bairros</h3>
  <input type="text" id="bairroSearch" placeholder="Pesquisar bairro...">
  <div id="bairroList"></div>
  <button id="clearFilter">Limpar filtro</button>
  <div id="resultInfo">Carregando...</div>
</div>

<div id="map"></div>

<script>

// ── Configuração de eleições ───────────────────────────────────────────────
//
// Para adicionar uma nova eleição basta incluir uma entrada aqui.
// A estrutura é:
//   chave_tipo: {
//     label: "Texto do botão",        ← texto exibido no filtro de tipo
//     cargos: {
//       "Nome do Cargo": {
//         geojson:    "caminho/para/arquivo.geojson",
//         candidatos: { "NOME COMPLETO": "#cor_hex", ... }
//       }
//     }
//   }

const CONFIG_ELEICOES = {
  municipais_2024: {
    label: "Mun. 2024",
    cargos: {
      Prefeito: {
        geojson: "data/municipais_2024/prefeito_2024.geojson",
        candidatos: {
          "FABIO NUNEZ NOVO (PT)":                "#e74c3c",
          "FRANCINALDO SILVA LEÃO (PSOL)":        "#f1c40f",
          "GERALDO DO NASCIMENTO CARVALHO (PSTU)":"#8e44ad",
          "JOSE SANTIAGO BELIZARIO (UP)":         "#f39c12",
          "JOSÉ PESSOA LEAL (PRD)":               "#c0392b",
          "MARIA DE LOURDES SOARES MELO (PCO)":   "#16a085",
          "SILVIO MENDES DE OLIVEIRA FILHO (UNIAO)":"#2980b9",
          "TELSÍRIO CARVALHO LIMA ALENCAR (MOBI)":"#d35400",
          "TONNY KERLEY DE ALENCAR RODRIGUES (NOVO)":"#2980b9",
        },
      },
    },
  },
  gerais_2022: {
    label: "Gerais 2022",
    cargos: {
      Governador: {
        geojson: "data/gerais_2022/governador_2022.geojson",
        candidatos: {
          "DIEGO GOMES MELO":                "#1abc9c",
          "GERALDO DO NASCIMENTO CARVALHO":  "#9b59b6",
          "GESSY KARLA LIMA BORGES FONSECA": "#34495e",
          "GUSTAVO HENRIQUE LEITE FEIJÓ":    "#e67e22",
          "MARIA DE LOURDES SOARES MELO":    "#2ecc71",
          "MARIA MADALENA NUNES":            "#e84393",
          "RAFAEL TAJRA FONTELES":           "#e74c3c",
          "RAVENNA DE CASTRO LIMA AZEVEDO":  "#00cec9",
          "SILVIO MENDES DE OLIVEIRA FILHO": "#0984e3",
        },
      },
    },
  },
};

// ── Estado global ─────────────────────────────────────────────────────────

let tipoSelecionado  = "municipais_2024";
let cargoSelecionado = "Prefeito";
let candidatosAtivos = {};   // { "NOME": "#cor" }
let geojsonData      = null;
let geojsonLayer     = null;
let bairroSelecionado = null;

// ── Mapa ──────────────────────────────────────────────────────────────────

const map = L.map("map", {
  zoomControl: false
}).setView([-5.09, -42.80], 12);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap & CartoDB",
}).addTo(map);

// ── Refs DOM ──────────────────────────────────────────────────────────────

const bairroSearch  = document.getElementById("bairroSearch");
const bairroList    = document.getElementById("bairroList");
const clearFilter   = document.getElementById("clearFilter");
const resultInfo    = document.getElementById("resultInfo");
const sidebar       = document.getElementById("sidebar");
const toggleSidebar = document.getElementById("toggleSidebar");

// ── Renderização dos filtros ───────────────────────────────────────────────

function renderizarTiposEleicao() {
  const grupo = document.getElementById("grupoTipoEleicao");
  grupo.innerHTML = "";

  Object.entries(CONFIG_ELEICOES).forEach(([chave, cfg]) => {
    const btn = document.createElement("button");
    btn.className  = "filter-btn" + (chave === tipoSelecionado ? " active" : "");
    btn.textContent = cfg.label;

    btn.addEventListener("click", () => {
      tipoSelecionado = chave;

      // Se o cargo atual não existe no novo tipo, usa o primeiro disponível
      const cargosDisponiveis = Object.keys(CONFIG_ELEICOES[tipoSelecionado].cargos);
      if (!cargosDisponiveis.includes(cargoSelecionado)) {
        cargoSelecionado = cargosDisponiveis[0];
      }

      renderizarTiposEleicao();
      renderizarCargos();
      carregarGeojson();
    });

    grupo.appendChild(btn);
  });
}

function renderizarCargos() {
  const grupo = document.getElementById("grupoCargo");
  grupo.innerHTML = "";

  const cargos = Object.keys(CONFIG_ELEICOES[tipoSelecionado].cargos);

  cargos.forEach(cargo => {
    const btn = document.createElement("button");
    btn.className   = "filter-btn" + (cargo === cargoSelecionado ? " active" : "");
    btn.textContent = cargo;

    btn.addEventListener("click", () => {
      cargoSelecionado = cargo;
      renderizarCargos();
      carregarGeojson();
    });

    grupo.appendChild(btn);
  });
}

// ── Carregamento de dados ─────────────────────────────────────────────────

function carregarGeojson() {
  const cfgCargo = CONFIG_ELEICOES[tipoSelecionado].cargos[cargoSelecionado];
  candidatosAtivos = cfgCargo.candidatos;

  resultInfo.textContent = "Carregando dados...";
  bairroSelecionado = null;
  bairroSearch.value = "";

  fetch(cfgCargo.geojson)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      geojsonData = data;
      renderizarListaBairros();
      aplicarFiltro();
    })
    .catch(err => {
      console.error("Erro ao carregar GeoJSON:", err);
      resultInfo.textContent = `Erro ao carregar: ${cfgCargo.geojson}`;
    });
}

// ── Popups ────────────────────────────────────────────────────────────────

function criarTabelaCandidatos(props, vencedor) {
  return Object.keys(candidatosAtivos)
    .map(c => ({
      nome: c,
      votos: Number(props[c] || 0),
      pct:   Number(props["% " + c] || 0),
    }))
    .sort((a, b) => b.votos - a.votos)
    .map(c => {
      const destaque = c.nome === vencedor
        ? `style="font-weight:bold; color:${candidatosAtivos[c.nome] || "#333"}"`
        : "";
      return `
        <tr ${destaque}>
          <td>${c.nome}</td>
          <td style="text-align:right; padding-left:8px">${c.votos}</td>
          <td style="text-align:right; padding-left:8px">${c.pct.toFixed(2)}%</td>
        </tr>
      `;
    })
    .join("");
}

function criarPopupLocal(feature) {
  const p = feature.properties;
  return `
    <b>${p["LOCAL DE VOTAÇÃO"]}</b><br>
    <b>Bairro:</b> ${p["BAIRRO"] || "Zona Rural"}<br>
    <b>Total de votos:</b> ${p.TOTAL}<br><br>
    <table style="font-size:12px; border-collapse:collapse; width:100%">
      ${criarTabelaCandidatos(p, p.vencedor)}
    </table>
  `;
}

function criarPopupBairro(feature, quantidadeLocais) {
  const p = feature.properties;
  return `
    <b>${p.BAIRRO}</b><br>
    <b>Locais de votação agregados:</b> ${quantidadeLocais}<br>
    <b>Total de votos no bairro:</b> ${p.TOTAL}<br><br>
    <table style="font-size:12px; border-collapse:collapse; width:100%">
      ${criarTabelaCandidatos(p, p.vencedor)}
    </table>
  `;
}

// ── Agregação por bairro ──────────────────────────────────────────────────

function agregarDadosDoBairro(features, nomeBairro) {
  const nomes = Object.keys(candidatosAtivos);
  let totalVotos = 0, somaLat = 0, somaLng = 0;
  const agregados = Object.fromEntries(nomes.map(c => [c, 0]));

  features.forEach(f => {
    const p      = f.properties;
    const coords = f.geometry.coordinates;
    totalVotos += Number(p.TOTAL || 0);
    somaLng    += Number(coords[0]);
    somaLat    += Number(coords[1]);
    nomes.forEach(c => { agregados[c] += Number(p[c] || 0); });
  });

  const vencedor = nomes.reduce((melhor, c) =>
    agregados[c] > (agregados[melhor] ?? -1) ? c : melhor, nomes[0]);

  const props = {
    BAIRRO: nomeBairro,
    TOTAL: totalVotos,
    vencedor,
    "LOCAL DE VOTAÇÃO": `Bairro ${nomeBairro}`,
  };
  nomes.forEach(c => {
    props[c]          = agregados[c];
    props["% " + c]   = totalVotos > 0 ? (agregados[c] / totalVotos) * 100 : 0;
  });

  return {
    type: "Feature",
    properties: props,
    geometry: {
      type: "Point",
      coordinates: [somaLng / features.length, somaLat / features.length],
    },
  };
}

// ── Desenho no mapa ───────────────────────────────────────────────────────

function desenharPontosOriginais(features) {
  if (geojsonLayer) map.removeLayer(geojsonLayer);

  geojsonLayer = L.geoJSON(features, {
    pointToLayer: (feature, latlng) => {
      const p   = feature.properties;
      const cor = candidatosAtivos[p.vencedor] || "gray";
      return L.circleMarker(latlng, {
        radius:      Math.sqrt(Number(p.TOTAL || 0)) / 5,
        fillColor:   cor,
        color:       "#fff",
        weight:      1,
        fillOpacity: 0.8,
      });
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(criarPopupLocal(feature), { maxWidth: 360 });
    },
  }).addTo(map);

  if (features.length > 0) {
    const bounds = geojsonLayer.getBounds();
    if (bounds.isValid()) map.fitBounds(bounds, { padding: [30, 30] });
  }
}

function desenharPontoAgregado(featureAgregado, quantidadeLocais) {
  if (geojsonLayer) map.removeLayer(geojsonLayer);

  geojsonLayer = L.geoJSON(featureAgregado, {
    pointToLayer: (feature, latlng) => {
      const p   = feature.properties;
      const cor = candidatosAtivos[p.vencedor] || "gray";
      return L.circleMarker(latlng, {
        radius:      Math.max(12, Math.sqrt(Number(p.TOTAL || 0)) / 4),
        fillColor:   cor,
        color:       "#fff",
        weight:      2,
        fillOpacity: 0.85,
      });
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(criarPopupBairro(feature, quantidadeLocais), { maxWidth: 380 });
    },
  }).addTo(map);

  const coords = featureAgregado.geometry.coordinates;
  map.setView([coords[1], coords[0]], 14);
}

// ── Filtro de bairro ──────────────────────────────────────────────────────

function aplicarFiltro() {
  const todas = geojsonData.features;

  if (bairroSelecionado) {
    const filtradas = todas.filter(f =>
      (f.properties.BAIRRO || "Zona Rural").trim() === bairroSelecionado
    );

    if (filtradas.length > 0) {
      const agregado = agregarDadosDoBairro(filtradas, bairroSelecionado);
      desenharPontoAgregado(agregado, filtradas.length);
      resultInfo.textContent = `Bairro: ${bairroSelecionado} (${filtradas.length} local(is))`;
    } else {
      resultInfo.textContent = `Nenhum dado para: ${bairroSelecionado}`;
    }
  } else {
    desenharPontosOriginais(todas);
    resultInfo.textContent = `Exibindo todos os bairros (${todas.length} ponto(s))`;
  }
}

function renderizarListaBairros(filtroTexto = "") {
  const bairros = [...new Set(
    geojsonData.features.map(f => (f.properties.BAIRRO || "Zona Rural").trim())
  )].sort((a, b) => a.localeCompare(b, "pt-BR"));

  const filtrados = bairros.filter(b =>
    b.toLowerCase().includes(filtroTexto.toLowerCase())
  );

  bairroList.innerHTML = "";

  if (filtrados.length === 0) {
    bairroList.innerHTML = `<div class="bairro-item">Nenhum bairro encontrado</div>`;
    return;
  }

  filtrados.forEach(bairro => {
    const item = document.createElement("div");
    item.className  = "bairro-item" + (bairro === bairroSelecionado ? " active" : "");
    item.textContent = bairro;
    item.addEventListener("click", () => {
      bairroSelecionado = bairro;
      renderizarListaBairros(bairroSearch.value);
      aplicarFiltro();
    });
    bairroList.appendChild(item);
  });
}

// ── Eventos ───────────────────────────────────────────────────────────────

clearFilter.addEventListener("click", () => {
  bairroSelecionado = null;
  bairroSearch.value = "";
  renderizarListaBairros();
  aplicarFiltro();
});

bairroSearch.addEventListener("input", e => {
  renderizarListaBairros(e.target.value);
});

toggleSidebar.addEventListener("click", () => {
  sidebar.classList.toggle("collapsed");
  toggleSidebar.textContent = sidebar.classList.contains("collapsed") ? "▶" : "◀";
});

// ── Inicialização ─────────────────────────────────────────────────────────

renderizarTiposEleicao();
renderizarCargos();
carregarGeojson();

</script>
</body>
</html>
