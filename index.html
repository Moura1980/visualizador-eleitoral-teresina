<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visualizador Eleitoral</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>

const cores = {
  "RAFAEL TAJRA FONTELES": "#e74c3c",
  "SILVIO MENDES DE OLIVEIRA FILHO": "#2980b9",
  "GERALDO DO NASCIMENTO CARVALHO": "#f1c40f",
  "DIEGO GOMES MELO": "#2ecc71",
  "GESSY KARLA LIMA BORGES FONSECA": "#8e44ad",
  "GUSTAVO HENRIQUE LEITE FEIJÓ": "#f39c12",
  "MARIA DE LOURDES SOARES MELO": "#c0392b",
  "MARIA MADALENA NUNES": "#16a085",
  "RAVENNA DE CASTRO LIMA AZEVEDO": "#d35400"
};

const candidatos = [
  "DIEGO GOMES MELO", "GERALDO DO NASCIMENTO CARVALHO",
  "GESSY KARLA LIMA BORGES FONSECA", "GUSTAVO HENRIQUE LEITE FEIJÓ",
  "MARIA DE LOURDES SOARES MELO", "MARIA MADALENA NUNES",
  "RAFAEL TAJRA FONTELES", "RAVENNA DE CASTRO LIMA AZEVEDO",
  "SILVIO MENDES DE OLIVEIRA FILHO"
];

const map = L.map('map').setView([-5.09, -42.80], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

fetch("resultados.geojson")
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      pointToLayer: (feature, latlng) => {
        const p = feature.properties;
        const cor = cores[p.vencedor] || "gray";
        const raio = Math.sqrt(p.TOTAL) / 6;

        return L.circleMarker(latlng, {
          radius: raio,
          fillColor: cor,
          color: "#fff",
          weight: 1,
          fillOpacity: 0.8
        });
      },
      onEachFeature: (feature, layer) => {
        const p = feature.properties;

        const lista = candidatos
          .map(c => ({ nome: c, pct: p["% " + c] || 0 }))
          .sort((a, b) => b.pct - a.pct)
          .map(c => {
            const destaque = c.nome === p.vencedor
              ? `style="font-weight:bold; color:${cores[c.nome] || '#333'}"` : "";
            const votos = p[c.nome] || 0;
            return `<tr ${destaque}>
              <td>${c.nome}</td>
              <td style="text-align:right; padding-left:8px">${votos}</td>
              <td style="text-align:right; padding-left:8px">${c.pct.toFixed(2)}%</td>
            </tr>`;
          })
          .join("");

        layer.bindPopup(`
          <b>${p["LOCAL DE VOTAÇÃO"]}</b><br>
          Total de votos: ${p.TOTAL}<br><br>
          <table style="font-size:12px; border-collapse:collapse; width:100%">
            ${lista}
          </table>
        `, { maxWidth: 360 });
      }
    }).addTo(map);
  });

</script>
</body>
</html>
