<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visualizador Eleitoral</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>

const cores = {
  "RAFAEL TAJRA FONTELES": "#e74c3c",
  "SILVIO MENDES DE OLIVEIRA FILHO": "#2980b9",
};

const map = L.map('map').setView([-5.09, -42.80], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

fetch("resultados.geojson")
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      pointToLayer: (feature, latlng) => {
        const p = feature.properties;
        const cor = cores[p.vencedor] || "gray";
        const raio = Math.sqrt(p.TOTAL) / 6;  // tamanho proporcional

        return L.circleMarker(latlng, {
          radius: raio,
          fillColor: cor,
          color: "#fff",
          weight: 1,
          fillOpacity: 0.8
        });
      },
      onEachFeature: (feature, layer) => {
        const p = feature.properties;
        layer.bindPopup(`
          <b>${p["LOCAL DE VOTAÇÃO"]}</b><br>
          Vencedor: ${p.vencedor}<br>
          Total de votos: ${p.TOTAL}
        `);
      }
    }).addTo(map);
  });

</script>
</body>
</html>
